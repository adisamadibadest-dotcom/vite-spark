kind = "mobile"
previewPath = "/mobile/"
title = "ApexGold AI Mobile"
version = "1.0.0"
id = "artifacts/apexgold-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22107

[services.development]
run = "pnpm --filter @workspace/apexgold-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/apexgold-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/apexgold-mobile", "run", "serve" ]

[services.env]
PORT = "22107"
BASE_PATH = "/mobile/"
